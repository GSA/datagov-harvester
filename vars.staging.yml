app_name: datagov-harvest
space_name: staging
route_external: harvest-stage.data.gov
route_internal: datagov-harvest-staging.apps.internal
proxy_instances: 2
basic_auth_enabled: on # nginx terminology 'on' 'off'. cf will interpret these as 'true' 'false'
admin_instances: 2
admin_memory_quota: 1G
admin_disk_quota: 4G

# Placeholder for manifest ((asset_version)); CI overrides via --var on deploy
asset_version: set-at-deploy

CF_API_URL: https://api.fr.cloud.gov
CATALOG_BASE_URL: https://catalog-stage.data.gov

# CKAN can't handle too many tasks talking to it
HARVEST_RUNNER_MAX_TASKS: 3
HARVEST_RETRY_ON_ERROR: true

MDTRANSLATOR_URL: https://mdtranslator-staging.apps.internal:61443/translates

# Login.gov
CLIENT_ID: urn:gov:gsa:openidconnect.profiles:sp:sso:gsa:datagov-staging-harvest-admin
ISSUER: https://secure.login.gov
# Redirect URI should match route_external from above
REDIRECT_URI: https://harvest-stage.data.gov/callback

# New Relic
new_relic_monitor_mode: true
