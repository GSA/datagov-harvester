---
applications:
  - name: ((app_name))-proxy
    buildpacks:
      - https://github.com/cloudfoundry/nginx-buildpack
    services:
      - ((app_name))-secrets
      - logstack-space-drain
    path: ./proxy
    memory: 100M
    instances: ((proxy_instances))
    routes:
      - route: ((route_external))
    env:
      EXTERNAL_ROUTE: ((route_external))
      INTERNAL_ROUTE: ((route_internal))
      BASIC_AUTH_ENABLED: ((basic_auth_enabled))

  - name: ((app_name))
    buildpacks:
      - python_buildpack
    routes:
      - route: ((route_internal))
    services:
      - ((app_name))-db
      - ((app_name))-secrets
      - datagov-catalog-opensearch
      - ((app_name))-smtp
      - logstack-space-drain
    instances: ((admin_instances))
    memory: ((admin_memory_quota))
    disk_quota: ((admin_disk_quota))
    env:
      FLASK_APP: run.py
      CF_API_URL: ((CF_API_URL))
      CATALOG_BASE_URL: ((CATALOG_BASE_URL))
      HARVEST_RUNNER_MAX_TASKS: ((HARVEST_RUNNER_MAX_TASKS))
      HARVEST_RETRY_ON_ERROR: ((HARVEST_RETRY_ON_ERROR))
      MDTRANSLATOR_URL: ((MDTRANSLATOR_URL))
      CLIENT_ID: ((CLIENT_ID))
      ISSUER: ((ISSUER))
      REDIRECT_URI: ((REDIRECT_URI))
      NEW_RELIC_APP_NAME: ((app_name))-((space_name))
      NEW_RELIC_HOST: gov-collector.newrelic.com
      NEW_RELIC_MONITOR_MODE: ((new_relic_monitor_mode))
      NEW_RELIC_CONFIG_FILE: /home/vcap/app/config/newrelic.ini
    command: ./app-start.sh
