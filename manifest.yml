---
# To apply this manifest: cf push --vars-file vars.<space>.yml

x-airflow-common: &airflow-common
  buildpacks:
    - python_buildpack
  memory: ((memory-quota))
  disk_quota: ((disk-quota))
  services:
    - ((app-name))-db
    - ((app-name))-redis
    - ((app-name))-s3
  env: &airflow-common-env
    # TODO most of these should be in airflow.cfg for prod
    AIRFLOW__CORE__STORE_DAG_CODE: true
    AIRFLOW__CORE__STORE_SERIALIZED_DAGS: true
    AIRFLOW__CORE__DAGS_FOLDER: /home/vcap/app/dags
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: true
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: false
    AIRFLOW__CORE__MAX_MAP_LENGTH: 5000
    AIRFLOW__CORE__TEST_CONNECTION: Enabled
    AIRFLOW__CELERY__FLOWER_PORT: 8080
    AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: false
    AIRFLOW__LOGGING__REMOTE_LOGGING: true
    AIRFLOW__LOGGING__LOGGING_LEVEL: DEBUG
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: true
    AIRFLOW__SCHEDULER__STANDALONE_DAG_PROCESSOR: true
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: true  # TODO REMOVE

applications:
  - name: ((app-name))-webserver
    <<: *airflow-common
    instances: ((webserver-instances))
    health-check-type: http
    health-check-http-endpoint: /health
    health-check-invocation-timeout: 60
    command: airflow version && airflow db migrate && airflow webserver
    env:
      <<: *airflow-common-env

  - name: ((app-name))-worker
    <<: *airflow-common
    no-route: true
    health-check-type: process
    instances: ((worker-instances))
    command: airflow celery worker --concurrency=1
    env:
      <<: *airflow-common-env

  - name: ((app-name))-flower
    <<: *airflow-common
    health-check-type: process
    instances: ((flower-instances)) 
    command: airflow celery flower
    env:
      <<: *airflow-common-env

  - name: ((app-name))-dagprocessor
    <<: *airflow-common
    no-route: true
    health-check-type: process
    instances: ((scheduler-instances))
    command: airflow dag-processor --verbose
    env:
      <<: *airflow-common-env

  - name: ((app-name))-scheduler
    <<: *airflow-common
    no-route: true
    health-check-type: process
    instances: ((scheduler-instances))
    command: airflow scheduler
    env:
      <<: *airflow-common-env

  - name: ((app-name))-triggerer
    <<: *airflow-common
    no-route: true
    health-check-type: process
    instances: ((triggerer-instances))
    command: airflow triggerer
    env:
      <<: *airflow-common-env
